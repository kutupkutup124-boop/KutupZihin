<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutup Zihin | Mental Takip Sistemi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f4;          
            --card-bg: #ffffff;
            --primary: #7a9b76;           
            --primary-hover: #5c7a58;     
            --text-main: #2f3e2e;         
            --text-muted: #6b7b69;        
            --border: #d3dbd2;            
            --danger: #d9776c;            
            --success: #7a9b76;
            --warning-bg: #fdf6ec;
            --warning-text: #b07d54;
            --warning-border: #dcb38f;
            --inconsistent-bg: #fef2f2;
            --inconsistent-text: #991b1b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg); max-width: 650px; width: 100%; padding: 35px;
            border-radius: 20px; box-shadow: 0 12px 30px rgba(122, 155, 118, 0.1);
        }

        h1 { color: var(--primary); font-size: 28px; text-align: center; margin-bottom: 5px; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        .question-block { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); transition: background 0.3s; border-radius: 8px; }
        .question-block:hover { background-color: #fbfcfa; }
        .question-text { font-weight: 500; margin-bottom: 12px; display: block; padding: 0 10px; }
        
        .options-container { display: flex; justify-content: space-between; align-items: center; gap: 5px; padding: 0 10px; }
        .option-label { display: flex; flex-direction: column; align-items: center; font-size: 13px; color: var(--text-muted); cursor: pointer; font-weight: 500; }
        .option-label input { margin-bottom: 8px; transform: scale(1.3); accent-color: var(--primary); cursor: pointer; }
        .scale-labels { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-muted); margin-top: 8px; padding: 0 10px; }

        button {
            width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 15px;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(122, 155, 118, 0.2); }
        button.secondary { background-color: var(--text-muted); box-shadow: none; }
        button.secondary:hover { background-color: #4a5749; }

        #results-screen, #history-screen { display: none; }

        .result-card { padding: 18px; border-radius: 12px; margin-bottom: 12px; font-weight: 500; font-size: 14.5px; line-height: 1.5; }
        .status-needs-care { background-color: var(--warning-bg); color: var(--warning-text); border-left: 5px solid var(--warning-border); }
        .status-good { background-color: #f3f7f3; color: var(--primary-hover); border-left: 5px solid var(--primary); }
        .status-inconsistent { background-color: var(--inconsistent-bg); color: var(--inconsistent-text); border: 1px solid #fca5a5; font-size: 13.5px; }

        .motivation-box {
            background-color: #f3f7f3; border: 1px dashed var(--primary); border-radius: 12px;
            padding: 22px; margin: 25px 0; text-align: center;
        }
        .motivation-title { font-weight: 600; color: var(--primary-hover); margin-bottom: 12px; font-size: 16px; }
        .motivation-task { color: var(--text-main); font-size: 15px; font-style: italic; }

        .chart-container { margin-top: 25px; padding: 15px; border: 1px solid var(--border); border-radius: 12px; background: white; }
        .error { color: var(--danger); font-size: 14px; text-align: center; margin-bottom: 15px; display: none; font-weight: 500; }
        .nav-buttons { display: flex; gap: 12px; }
    </style>
</head>
<body>

<div class="container" id="app-container">
    
    <div id="survey-screen">
        <h1>Kutup Zihin</h1>
        <p class="subtitle">Günlük mental denge taramasına hoş geldiniz.</p>
        <div class="error" id="error-msg">Analiz için lütfen tüm soruları işaretleyin.</div>
        <form id="survey-form"></form>
        <div class="nav-buttons">
            <button onclick="calculateResults()">Durumumu Analiz Et</button>
            <button class="secondary" onclick="showHistory()" style="flex: 0.5;">Geçmiş Veriler</button>
        </div>
    </div>

    <div id="results-screen">
        <h1>Kutup Zihin Analizi</h1>
        <p class="subtitle" style="margin-bottom: 15px;">Bugünkü zihinsel verilerinize göre durumunuz:</p>
        <div id="results-content"></div>
        <div class="motivation-box">
            <div class="motivation-title">🌿 Kutup Zihin Önerisi</div>
            <div class="motivation-task" id="motivation-text">Öneri hazırlanıyor...</div>
        </div>
        <div class="nav-buttons">
            <button class="secondary" onclick="location.reload()">Yeni Test</button>
            <button onclick="showHistory()">Gelişim Grafiği</button>
        </div>
    </div>

    <div id="history-screen">
        <h1>Gelişim Seyri</h1>
        <p class="subtitle">Kutup Zihin ile son 14 günlük değişim grafiğiniz.</p>
        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>
        <button class="secondary" onclick="location.reload()" style="margin-top: 20px;">Ana Sayfaya Dön</button>
    </div>

</div>

<script>
    // Önceki sürümdeki soru havuzu ve çelişki algoritması korunmuştur.
    const pairedQuestions = [
        [{ id: "p1a", text: "Bugün kendimi genel olarak enerjik hissettim.", category: "ruh_sagligi", reverse: false, pairId: 1 },
         { id: "p1b", text: "Bugün içimden hiçbir şey yapmak gelmedi.", category: "ruh_sagligi", reverse: true, pairId: 1 }],
        [{ id: "p2a", text: "Sabah uyandığımda kendimi dinlenmiş hissettim.", category: "uyku", reverse: false, pairId: 2 },
         { id: "p2b", text: "Gece boyunca sık sık uyandım veya yatağa dönmekte zorlandım.", category: "uyku", reverse: true, pairId: 2 }],
        [{ id: "p3a", text: "Karşılaştığım küçük pürüzleri bugün sakinlikle çözebildim.", category: "ruh_sagligi", reverse: false, pairId: 3 },
         { id: "p3b", text: "Normalde önemsemeyeceğim ufak tefek şeyler bugün gereğinden fazla canımı sıktı.", category: "ruh_sagligi", reverse: true, pairId: 3 }],
        [{ id: "p4a", text: "Geleceğe veya yarınki görevlerime dair hevesli hissediyorum.", category: "ruh_sagligi", reverse: false, pairId: 4 },
         { id: "p4b", text: "Önümdeki günler gözüme aşırı yorucu ve karanlık görünüyor.", category: "ruh_sagligi", reverse: true, pairId: 4 }],
        [{ id: "p5a", text: "Bugün ekip arkadaşlarımla uyum içinde çalıştığımı hissettim.", category: "ruh_sagligi", reverse: false, pairId: 5 },
         { id: "p5b", text: "Bugün çevremdeki insanların varlığı bana nedensizce batmaya başladı.", category: "ruh_sagligi", reverse: true, pairId: 5 }],
        [{ id: "p6a", text: "Dün gece uykuya dalmam oldukça kolay oldu.", category: "uyku", reverse: false, pairId: 6 },
         { id: "p6b", text: "Dün gece yatağa yattıktan sonra zihnimdeki düşünceler yüzünden uzun süre uyuyamadım.", category: "uyku", reverse: true, pairId: 6 }],
        [{ id: "p7a", text: "Günlük kişisel bakımıma (yemek, hijyen) yeterince özen gösterebildim.", category: "ruh_sagligi", reverse: false, pairId: 7 },
         { id: "p7b", text: "Bugün temel ihtiyaçlarımı karşılamak bile bana ağır bir yük gibi geldi.", category: "ruh_sagligi", reverse: true, pairId: 7 }],
        [{ id: "p8a", text: "Dikkatimi vermem gereken işlere kolayca odaklanabildim.", category: "ruh_sagligi", reverse: false, pairId: 8 },
         { id: "p8b", text: "Okuduğum veya yaptığım şeyleri sürekli baştan almak zorunda kaldım, zihnim çok dağınıktı.", category: "ruh_sagligi", reverse: true, pairId: 8 }],
        [{ id: "p9a", text: "Uykumun kalitesi genel olarak beni tatmin etti.", category: "uyku", reverse: false, pairId: 9 },
         { id: "p9b", text: "Ne kadar uyursam uyuyayım, uykumu hiç alamamışım gibi hissediyorum.", category: "uyku", reverse: true, pairId: 9 }],
        [{ id: "p10a", text: "Bulunduğum ortamda kendimi güvende ve huzurlu hissediyorum.", category: "ruh_sagligi", reverse: false, pairId: 10 },
         { id: "p10b", text: "Sürekli tetikteyim ve içimde nedensiz bir huzursuzluk/sıkıntı var.", category: "ruh_sagligi", reverse: true, pairId: 10 }]
    ];

    const singleQuestions = [
        { id: "s1", text: "Bugün kaslarımda (boyun, omuz, çene) istemsiz bir gerginlik hissettim.", category: "ruh_sagligi", reverse: true, pairId: null },
        { id: "s2", text: "Ekip arkadaşlarımla sohbet etmek bugün bana iyi geldi.", category: "ruh_sagligi", reverse: false, pairId: null },
        { id: "s3", text: "Zaman zaman nefes darlığı veya göğsümde hafif bir baskı hissettim.", category: "ruh_sagligi", reverse: true, pairId: null },
        { id: "s4", text: "Gün içinde kendimi istemsizce gülerken veya gülümserken yakaladım.", category: "ruh_sagligi", reverse: false, pairId: null },
        { id: "s5", text: "Kendimi dış dünyadan tamamen soyutlanmış hissettim.", category: "ruh_sagligi", reverse: true, pairId: null },
        { id: "s6", text: "Gün içinde o kadar yorgundum ki gözlerimi açık tutmakta zorlandım.", category: "uyku", reverse: true, pairId: null },
        { id: "s7", text: "Yaptığım çalışmaların veya buradaki varlığımın anlamlı olduğuna inanıyorum.", category: "ruh_sagligi", reverse: false, pairId: null },
        { id: "s8", text: "Eskiden keyif aldığım şeyler bugün hiç ilgimi çekmedi.", category: "ruh_sagligi", reverse: true, pairId: null },
        { id: "s9", text: "Aynaya baktığımda kendimi fiziksel ve ruhsal olarak tükenmiş gördüm.", category: "ruh_sagligi", reverse: true, pairId: null },
        { id: "s10", text: "Bugün yeni bir detay fark ettim ve bu hoşuma gitti.", category: "ruh_sagligi", reverse: false, pairId: null }
    ];

    const tasks = {
        harika: [
            "Bugün harika bir denge yakalamışsın! Ekip arkadaşlarına bu güzel enerjini yansıtarak istasyonun modunu yükseltebilirsin.",
            "Zihnin berrak görünüyor, bugün planladığın karmaşık bir araştırmaya vakit ayırmak için çok uygun bir gün.",
            "Bu sakin ve dinç halini korumak için günün sonunda sevdiğin sıcak bir içecekle kendine teşekkür etmeyi unutma.",
            "Yaratıcılığının zirvesindesin. Uzun zamandır ertelediğin o projeye başlamanın tam vakti."
        ],
        uyku: [
            "Yatmadan en az 1 saat önce mavi ışıktan uzaklaşmak Kutup Zihin dengenizi korur.",
            "Bugün öğleden sonra kafein alımını sınırlandırmayı deneyebilirsin.",
            "Yatağa girmeden önce 5 dakikalık basit bir nefes egzersizi derin uykuyu destekleyecektir."
        ],
        ruh_sagligi: [
            "Zihnini dinlendirmeye alan aç. Bugün 15 dakika sadece gözlerini kapatıp sessizliği dinle.",
            "Bugün stres yaratan karmaşık verileri okumaya ara ver. Sadece o ana odaklan.",
            "Bugün kendine karşı çok nazik ol. Her şeyi mükemmel yapmak zorunda değilsin."
        ]
    };

    let currentTestQuestions = [];

    function generateRandomTest() {
        let shuffledPairs = pairedQuestions.sort(() => 0.5 - Math.random()).slice(0, 5);
        let shuffledSingles = singleQuestions.sort(() => 0.5 - Math.random()).slice(0, 5);
        shuffledPairs.forEach(pair => { currentTestQuestions.push(pair[0]); currentTestQuestions.push(pair[1]); });
        currentTestQuestions.push(...shuffledSingles);
        currentTestQuestions = currentTestQuestions.sort(() => 0.5 - Math.random());
    }

    const form = document.getElementById('survey-form');
    generateRandomTest();
    currentTestQuestions.forEach((q, index) => {
        const questionHtml = `
            <div class="question-block">
                <span class="question-text">${index + 1}. ${q.text}</span>
                <div class="options-container">
                    ${[1, 2, 3, 4, 5].map(val => `
                        <label class="option-label">
                            <input type="radio" name="${q.id}" value="${val}" required>
                            ${val}
                        </label>
                    `).join('')}
                </div>
                <div class="scale-labels"><span>Hiç</span><span>Çok</span></div>
            </div>
        `;
        form.innerHTML += questionHtml;
    });

    function calculateResults() {
        const formData = new FormData(form);
        const errorMsg = document.getElementById('error-msg');
        let answers = {};
        for (let q of currentTestQuestions) {
            const val = formData.get(q.id);
            if (!val) { errorMsg.style.display = 'block'; return; }
            answers[q.id] = parseInt(val);
        }
        errorMsg.style.display = 'none';

        let inconsistencyScore = 0;
        let pairs = {}; 
        currentTestQuestions.forEach(q => {
            if(q.pairId) {
                if(!pairs[q.pairId]) pairs[q.pairId] = [];
                pairs[q.pairId].push(answers[q.id]);
            }
        });

        Object.values(pairs).forEach(pair => {
            if(pair.length === 2) {
                let diff = Math.abs((pair[0] + pair[1]) - 6);
                inconsistencyScore += diff;
            }
        });

        let isSabotaged = inconsistencyScore >= 5; 
        let scores = { ruh_sagligi: { t: 0, c: 0 }, uyku: { t: 0, c: 0 } };
        currentTestQuestions.forEach(q => {
            let val = answers[q.id];
            if(q.reverse) val = 6 - val;
            scores[q.category].t += val; 
            scores[q.category].c += 1; 
        });

        const avgScores = {
            ruh_sagligi: (scores.ruh_sagligi.t / scores.ruh_sagligi.c).toFixed(1),
            uyku: (scores.uyku.t / scores.uyku.c).toFixed(1)
        };

        if(!isSabotaged) { saveDataLocally(avgScores); }
        displayResults(avgScores, isSabotaged);
    }

    function displayResults(avgScores, isSabotaged) {
        document.getElementById('survey-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        const resultsContent = document.getElementById('results-content');
        resultsContent.innerHTML = '';

        if(isSabotaged) {
            resultsContent.innerHTML += `<div class="result-card status-inconsistent">⚠️ <strong>Tutarsızlık Tespit Edildi:</strong> Yanıtlarınız arasında mantıksal farklar var. Sonuçlar yanıltıcı olabilir.</div>`;
        }

        const categories = [{ key: 'ruh_sagligi', name: 'Zihinsel Odak' }, { key: 'uyku', name: 'Uyku Düzeni' }];
        let lowestCategory = null;
        let lowestScore = 5;

        categories.forEach(cat => {
            const avg = parseFloat(avgScores[cat.key]);
            const needsCare = avg < 3.2; 
            if (avg < lowestScore) { lowestScore = avg; lowestCategory = cat.key; }
            resultsContent.innerHTML += `<div class="result-card ${needsCare ? 'status-needs-care' : 'status-good'}"><strong>${cat.name}:</strong> ${avg} / 5</div>`;
        });

        let taskArray = lowestScore < 3.2 ? tasks[lowestCategory] : tasks.harika;
        document.getElementById('motivation-text').innerText = taskArray[Math.floor(Math.random() * taskArray.length)];
    }

    function saveDataLocally(scores) {
        let history = JSON.parse(localStorage.getItem('kutupZihinData') || '[]');
        const today = new Date().toLocaleDateString('tr-TR');
        history.push({ date: today, scores: scores });
        if(history.length > 14) history = history.slice(-14);
        localStorage.setItem('kutupZihinData', JSON.stringify(history));
    }

    function showHistory() {
        document.getElementById('survey-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('history-screen').style.display = 'block';
        const history = JSON.parse(localStorage.getItem('kutupZihinData') || '[]');
        if(history.length === 0) { alert("Henüz kayıtlı veri yok."); location.reload(); return; }
        const ctx = document.getElementById('historyChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(item => item.date),
                datasets: [
                    { label: 'Zihinsel', data: history.map(item => item.scores.ruh_sagligi), borderColor: '#7a9b76', tension: 0.4 },
                    { label: 'Uyku', data: history.map(item => item.scores.uyku), borderColor: '#b07d54', tension: 0.4 }
                ]
            },
            options: { scales: { y: { min: 1, max: 5 } } }
        });
    }
</script>
</body>
</html>
