<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolarMind Ön Tarama ve Takip</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #e0f2fe;
            --card-bg: #ffffff;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 650px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { color: var(--primary); font-size: 24px; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .question-block { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .question-text { font-weight: 600; margin-bottom: 10px; display: block; }
        .options-container { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .option-label { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: var(--text-muted); cursor: pointer; }
        .option-label input { margin-bottom: 5px; transform: scale(1.2); accent-color: var(--primary); }
        .scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

        button {
            width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: var(--text-muted); }
        button.secondary:hover { background-color: #475569; }

        #results-screen, #history-screen { display: none; }

        .result-card { padding: 15px; border-radius: 8px; margin-bottom: 10px; font-weight: 500; font-size: 14px; }
        .risk-high { background-color: #fee2e2; color: #b91c1c; border-left: 5px solid #ef4444; }
        .risk-low { background-color: #d1fae5; color: #047857; border-left: 5px solid #10b981; }

        .motivation-box {
            background-color: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
            padding: 20px; margin: 20px 0; text-align: center;
        }
        .motivation-title { font-weight: bold; color: #b45309; margin-bottom: 10px; font-size: 16px; }
        .motivation-task { color: #92400e; font-size: 15px; font-style: italic; }

        .chart-container { margin-top: 20px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
        
        .error { color: var(--danger); font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }
        .disclaimer { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }
        
        .nav-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container" id="app-container">
    
    <div id="survey-screen">
        <h1>PolarMind Günlük Takip</h1>
        <p class="subtitle">Bugünkü hislerinizi düşünerek 1 (Hiç katılmıyorum) ile 5 (Çok katılıyorum) arasında puanlayın.</p>
        
        <div class="error" id="error-msg">Lütfen tüm soruları yanıtlayın.</div>

        <form id="survey-form"></form>

        <div class="nav-buttons">
            <button onclick="calculateResults()">Sonuçları Analiz Et</button>
            <button class="secondary" onclick="showHistory()" style="flex: 0.5;">Geçmişi Gör</button>
        </div>
    </div>

    <div id="results-screen">
        <h1>Günün Analizi</h1>
        
        <div id="results-content"></div>
        
        <div class="motivation-box">
            <div class="motivation-title">🎯 Günün Görevi</div>
            <div class="motivation-task" id="motivation-text">Görev yükleniyor...</div>
        </div>

        <div class="nav-buttons">
            <button class="secondary" onclick="location.reload()">Ana Ekrana Dön</button>
            <button onclick="showHistory()">Gelişim Grafiğini İncele</button>
        </div>
    </div>

    <div id="history-screen">
        <h1>Gelişim Grafiği</h1>
        <p class="subtitle">Son 14 testinizin risk ortalamaları (Puan düştükçe risk artar)</p>

        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>

        <button class="secondary" onclick="location.reload()">Ana Ekrana Dön</button>
    </div>

</div>

<script>
    const questions = [
        { id: "q1", text: "Kendimi enerjik hissettim.", category: "depresyon" },
        { id: "q2", text: "Günlük faaliyetlerimle ilgilenebildim.", category: "depresyon" },
        { id: "q3", text: "Kendimi sakin ve dengeli hissettim.", category: "anksiyete" },
        { id: "q4", text: "Günlük yaşamımdan memnuniyet duydum.", category: "depresyon" },
        { id: "q5", text: "Günlük sorumluluklarımı yönetebildiğimi hissettim.", category: "anksiyete" },
        { id: "q6", text: "Beklenmeyen durumlarla başa çıkabildim.", category: "anksiyete" },
        { id: "q7", text: "Günlük yoğunluk seviyem beni zorlamadı.", category: "anksiyete" },
        { id: "q8", text: "Uyku sürem benim için yeterliydi.", category: "uyku" },
        { id: "q9", text: "Uyandığımda dinlenmiş hissettim.", category: "uyku" },
        { id: "q10", text: "Bulunduğum ortamla uyum içinde hissettim.", category: "anksiyete" }
    ];

    // Motivasyon ve Görev Havuzu
    const tasks = {
        lowRisk: [
            "Bugün harika gidiyorsun! Ekip arkadaşlarına pozitif enerjini yansıt.",
            "Zihnin berrak görünüyor, bugün planladığın bir araştırmaya odaklanmak için harika bir gün.",
            "Bu dengeyi korumak için bugün sevdiğin bir müziği dinlemeyi veya kitap okumayı unutma."
        ],
        uyku: [
            "Yatmadan 1 saat önce ekranlardan (telefon/bilgisayar) uzaklaş ve sadece dinlen.",
            "Uyku kaliteni artırmak için kafein tüketimini bugün erken saatlerde kesmeye çalış.",
            "Uyuduğun odanın tamamen karanlık olduğundan emin ol ve uyku öncesi hafif bir germe egzersizi yap."
        ],
        depresyon: [
            "Bugün en az 15 dakika gün ışığı lambası (SAD lambası) altında vakit geçir.",
            "Kendini zorlamadan, sadece bir ekip arkadaşınla 10 dakikalık kısa bir sohbet et.",
            "Geçmişte başardığın zor bir görevi hatırlayıp kendini takdir et."
        ],
        anksiyete: [
            "Bugün 5 dakikanı ayırarak sadece derin nefes alıp ver (4 saniye al, 7 saniye tut, 8 saniye ver).",
            "Zihnini sakinleştirmek için bugün aynı anda birden fazla iş yapma, tek bir göreve odaklan.",
            "Bugün haberleri veya stres yaratan dış verileri okumaya ara ver."
        ]
    };

    const form = document.getElementById('survey-form');

    // Soruları HTML'e ekle
    questions.forEach((q, index) => {
        const questionHtml = `
            <div class="question-block">
                <span class="question-text">${index + 1}. ${q.text}</span>
                <div class="options-container">
                    ${[1, 2, 3, 4, 5].map(val => `
                        <label class="option-label">
                            <input type="radio" name="${q.id}" value="${val}" required>
                            ${val}
                        </label>
                    `).join('')}
                </div>
                <div class="scale-labels"><span>Hiç Katılmıyorum</span><span>Çok Katılıyorum</span></div>
            </div>
        `;
        form.innerHTML += questionHtml;
    });

    function calculateResults() {
        const formData = new FormData(form);
        const errorMsg = document.getElementById('error-msg');
        let answers = {};
        
        for (let q of questions) {
            const val = formData.get(q.id);
            if (!val) { errorMsg.style.display = 'block'; return; }
            answers[q.id] = parseInt(val);
        }
        
        errorMsg.style.display = 'none';

        let scores = { depresyon: { t: 0, c: 0 }, anksiyete: { t: 0, c: 0 }, uyku: { t: 0, c: 0 } };
        questions.forEach(q => { scores[q.category].t += answers[q.id]; scores[q.category].c += 1; });

        const avgScores = {
            depresyon: (scores.depresyon.t / scores.depresyon.c).toFixed(1),
            anksiyete: (scores.anksiyete.t / scores.anksiyete.c).toFixed(1),
            uyku: (scores.uyku.t / scores.uyku.c).toFixed(1)
        };

        saveDataLocally(avgScores);
        displayResults(avgScores);
    }

    function displayResults(avgScores) {
        document.getElementById('survey-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        const resultsContent = document.getElementById('results-content');
        resultsContent.innerHTML = '';

        const categories = [
            { key: 'uyku', name: 'Uyku Bozukluğu Riski' },
            { key: 'depresyon', name: 'Depresif Belirti Riski' },
            { key: 'anksiyete', name: 'Anksiyete (Kaygı) Riski' }
        ];

        let lowestCategory = null;
        let lowestScore = 5;

        categories.forEach(cat => {
            const avg = parseFloat(avgScores[cat.key]);
            const isHighRisk = avg < 3.0;
            
            // Hangi alanda en çok zorlanıyorsa görevi ona göre seçeceğiz
            if (avg < lowestScore) {
                lowestScore = avg;
                lowestCategory = cat.key;
            }

            resultsContent.innerHTML += `
                <div class="result-card ${isHighRisk ? 'risk-high' : 'risk-low'}">
                    <strong>${cat.name}:</strong> ${isHighRisk ? 'Yüksek Riskli' : 'Normal Seviye'} (Puan: ${avg})
                </div>
            `;
        });

        // Motivasyon görevini belirle
        let taskArray = lowestScore < 3.0 ? tasks[lowestCategory] : tasks.lowRisk;
        let randomTask = taskArray[Math.floor(Math.random() * taskArray.length)];
        document.getElementById('motivation-text').innerText = randomTask;
    }

    function saveDataLocally(scores) {
        let history = JSON.parse(localStorage.getItem('polarData') || '[]');
        
        // Sadece günün tarihini al (saat hariç)
        const today = new Date().toLocaleDateString('tr-TR');
        
        history.push({ date: today, scores: scores });
        
        // En fazla son 14 günü tut (Hafızayı şişirmemek için)
        if(history.length > 14) history = history.slice(-14);
        
        localStorage.setItem('polarData', JSON.stringify(history));
    }

    function showHistory() {
        document.getElementById('survey-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('history-screen').style.display = 'block';

        const history = JSON.parse(localStorage.getItem('polarData') || '[]');
        
        if(history.length === 0) {
            alert("Henüz kaydedilmiş bir test sonucunuz bulunmuyor.");
            location.reload();
            return;
        }

        const labels = history.map((item, index) => `Test ${index + 1} (${item.date})`);
        const dataDepresyon = history.map(item => item.scores.depresyon);
        const dataAnksiyete = history.map(item => item.scores.anksiyete);
        const dataUyku = history.map(item => item.scores.uyku);

        const ctx = document.getElementById('historyChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Depresyon', data: dataDepresyon, borderColor: '#3b82f6', tension: 0.3 },
                    { label: 'Anksiyete', data: dataAnksiyete, borderColor: '#f59e0b', tension: 0.3 },
                    { label: 'Uyku', data: dataUyku, borderColor: '#8b5cf6', tension: 0.3 }
                ]
            },
            options: {
                responsive: true,
                scales: { y: { min: 1, max: 5, title: { display: true, text: 'Ortalama Puan' } } }
            }
        });
    }
</script>

</body>
</html>
